# Do not start every service at once: `dev` and `frontend`+`backend` both use ports 3000 and 5000.
# Typical stacks:
#   docker compose up --build mongodb backend frontend
#   docker compose up --build mongodb dev
# Optional MongoDB web UI: docker compose --profile mongo-ui up … (see mongo-express service)
services:
  mongodb:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: bcwallet_demo
    ports:
      # Published to loopback only — mongosh/Compass on the host; in-cluster use hostname `mongodb`
      - '127.0.0.1:27017:27017'
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo-express:
    image: mongo-express:1
    restart: unless-stopped
    profiles:
      - mongo-ui
    ports:
      - '127.0.0.1:8081:8081'
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: dev
      ME_CONFIG_BASICAUTH_PASSWORD: dev
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    image: bc-wallet-demo-web
    build:
      context: ./
      dockerfile: ./frontend/Dockerfile
    volumes:
      - type: bind
        source: ./frontend/Caddyfile
        target: /etc/caddy/Caddyfile
    ports:
      - '3000:3000'
    depends_on:
      - backend
    env_file:
      - ./frontend/.env
  backend:
    image: bc-wallet-demo-server
    build:
      context: ./
      dockerfile: ./server/Dockerfile
    ports:
      - '5000:5000'
    env_file:
      - ./server/.env
    environment:
      MONGODB_HOST: mongodb
      MONGODB_PORT: '27017'
      MONGODB_DB_NAME: bcwallet_demo
      MONGODB_URI: mongodb://mongodb:27017/bcwallet_demo
    depends_on:
      mongodb:
        condition: service_healthy
  dev:
    image: bc-wallet-demo-dev
    build:
      context: ./
      dockerfile: ./dev.dockerfile
    ports:
      - '3000:3000'
      - '5000:5000'
    volumes:
      - ./:/app
    environment:
      MONGODB_HOST: mongodb
      MONGODB_PORT: '27017'
      MONGODB_DB_NAME: bcwallet_demo
      MONGODB_URI: mongodb://mongodb:27017/bcwallet_demo
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongo-data:
