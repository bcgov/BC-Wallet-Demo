# Two mutually exclusive stacks — do NOT run both at once (ports 3000 and 5000 conflict):
#   Dev (hot-reload, Keycloak included):  docker compose --profile dev up --build
#   Production-like (pre-built images):   docker compose --profile prod up --build
# Optional MongoDB web UI: add --profile mongo-ui to either command (see mongo-express service)
services:
  mongodb:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: bc_wallet_showcase
    ports:
      # Published to loopback only — mongosh/Compass on the host; in-cluster use hostname `mongodb`
      - '127.0.0.1:27017:27017'
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo-express:
    image: mongo-express:1
    restart: unless-stopped
    profiles:
      - mongo-ui
    ports:
      - '127.0.0.1:8081:8081'
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: dev
      ME_CONFIG_BASICAUTH_PASSWORD: dev
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    image: bc-wallet-demo-web
    profiles:
      - prod
    build:
      context: ./
      dockerfile: ./frontend/Dockerfile
    volumes:
      - type: bind
        source: ./frontend/Caddyfile
        target: /etc/caddy/Caddyfile
    ports:
      - '3000:3000'
    depends_on:
      - backend
    env_file:
      - ./frontend/.env
  backend:
    image: bc-wallet-demo-server
    profiles:
      - prod
    build:
      context: ./
      dockerfile: ./server/Dockerfile
    ports:
      - '5000:5000'
    env_file:
      - ./server/.env
    environment:
      MONGODB_HOST: mongodb
      MONGODB_PORT: '27017'
      MONGODB_DB_NAME: bc_wallet_showcase
      MONGODB_URI: mongodb://mongodb:27017/bc_wallet_showcase
    depends_on:
      mongodb:
        condition: service_healthy
  dev:
    image: bc-wallet-demo-dev
    profiles:
      - dev
    build:
      context: ./
      dockerfile: ./dev.dockerfile
    ports:
      - '3000:3000'
      - '5000:5000'
    volumes:
      - ./:/app
      # Preserve node_modules installed in the image — the bind mount above would
      # otherwise shadow /app/node_modules with whatever is (or isn't) on the host.
      - dev-node-modules:/app/node_modules
    env_file:
      # Copy server/.env.example → server/.env before running.
      # `required: false` lets the stack start even without the file (useful in CI).
      - path: ./server/.env
        required: false
    environment:
      # These always override anything in server/.env so MongoDB stays on the Compose network.
      MONGODB_HOST: mongodb
      MONGODB_PORT: '27017'
      MONGODB_DB_NAME: bc_wallet_showcase
      MONGODB_URI: mongodb://mongodb:27017/bc_wallet_showcase
      # Server-side JWKS fetch must use the Docker service name, not localhost.
      # The issuer in config/keycloak.json stays as localhost:8080 to match
      # the URL the browser used when logging in.
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
    depends_on:
      mongodb:
        condition: service_healthy
      keycloak-db:
        condition: service_healthy

  keycloak:
    image: quay.io/keycloak/keycloak:26.5
    command: start-dev --import-realm
    profiles:
      - dev
    ports:
      - '8080:8080'
    volumes:
      - ./keycloak/config:/opt/keycloak/data/import
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: true
      # Disable HTTPS enforcement for local dev. With start-dev + HOSTNAME_STRICT=false
      # Keycloak derives its URL from the request Host header (localhost:8080), so
      # the OIDC issuer matches what the browser uses and token validation succeeds.
      KC_HOSTNAME_STRICT: 'false'
    depends_on:
      keycloak-db:
        condition: service_healthy

  keycloak-db:
    image: postgres:15-alpine
    profiles:
      - dev
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U keycloak']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
  keycloak-db-data:
  dev-node-modules:
