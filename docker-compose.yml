services:
  mongodb:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: bcwallet_demo
    expose:
      - '27017'
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    image: bc-wallet-demo-web
    build:
      context: ./
      dockerfile: ./client/Dockerfile
    volumes:
      - type: bind
        source: ./client/Caddyfile
        target: /etc/caddy/Caddyfile
    ports:
      - '3000:3000'
    depends_on:
      - backend
    env_file:
      - ./client/.env
  backend:
    image: bc-wallet-demo-server
    build:
      context: ./
      dockerfile: ./server/Dockerfile
    ports:
      - '5000:5000'
    env_file:
      - ./server/.env
    depends_on:
      mongodb:
        condition: service_healthy
  dev:
    image: bc-wallet-demo-dev
    build:
      context: ./
      dockerfile: ./dev.dockerfile
    ports:
      - '3000:3000'
      - '5000:5000'
    volumes:
      - ./:/app
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongo-data:
