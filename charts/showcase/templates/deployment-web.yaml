{{- $podLabels := include "common.tplvalues.merge" ( dict "values" ( list .Values.showcase.web.podLabels .Values.commonLabels ) "context" . ) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "showcase.web.fullname" . }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.showcase.web.replicaCount }}
  selector:
    matchLabels: {{- include "common.labels.matchLabels" ( dict "customLabels" $podLabels "context" $ ) | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels: {{- include "common.labels.standard" ( dict "customLabels" $podLabels "context" $ ) | nindent 8 }}
        app.kubernetes.io/component: web
      {{- if .Values.showcase.web.podAnnotations }}
      annotations: {{- include "common.tplvalues.render" (dict "value" .Values.showcase.web.podAnnotations "context" $) | nindent 8 }}
      {{- end }}
    spec:
      {{- include "common.images.renderPullSecrets" ( dict "images" (list .Values.showcase.web.image) "global" .Values.global ) | nindent 6 }}
      containers:
        - name: web
          image: {{ include "showcase.web.image" . }}
          imagePullPolicy: {{ .Values.showcase.web.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: REACT_APP_BASE_ROUTE
              value: {{ .Values.showcase.baseRoute | quote }}
            - name: REACT_APP_HOST_BACKEND
              value: {{ required "showcase.publicBackendUrl must be set to the browser-reachable API base URL (scheme + host[:port])" .Values.showcase.publicBackendUrl | quote }}
            {{- if .Values.showcase.insightsProjectId }}
            - name: REACT_APP_INSIGHTS_PROJECT_ID
              value: {{ .Values.showcase.insightsProjectId | quote }}
            {{- end }}
          volumeMounts:
            - name: caddyfile
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- if .Values.showcase.web.resources }}
          resources: {{- toYaml .Values.showcase.web.resources | nindent 12 }}
          {{- end }}
      volumes:
        - name: caddyfile
          configMap:
            name: {{ include "showcase.web.configmapName" . }}
      {{- if .Values.showcase.web.nodeSelector }}
      nodeSelector: {{- include "common.tplvalues.render" (dict "value" .Values.showcase.web.nodeSelector "context" $) | nindent 8 }}
      {{- end }}
      {{- if .Values.showcase.web.tolerations }}
      tolerations: {{- include "common.tplvalues.render" (dict "value" .Values.showcase.web.tolerations "context" $) | nindent 8 }}
      {{- end }}
      {{- if .Values.showcase.web.affinity }}
      affinity: {{- include "common.tplvalues.render" (dict "value" .Values.showcase.web.affinity "context" $) | nindent 8 }}
      {{- end }}
