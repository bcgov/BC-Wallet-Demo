{{- if .Values.showcase.server.seed.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "showcase.server.fullname" . }}-seed
  namespace: {{ include "showcase.namespace" . | quote }}
  labels: {{- include "showcase.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
  annotations:
    {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": hook-succeeded
    "helm.sh/hook-weight": "0"
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "showcase.labels" . | nindent 8 }}
        app.kubernetes.io/component: server
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: {{ include "showcase.server.image" . }}
          imagePullPolicy: {{ .Values.showcase.server.image.pullPolicy }}
          command: ["node", "-r", "dotenv/config", "build/scripts/seed.js"]
          {{- if .Values.showcase.server.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.showcase.server.existingSecret | quote }}
          {{- else if eq (include "showcase.server.chartServerSecretNeeded" . | trim) "1" }}
          envFrom:
            - secretRef:
                name: {{ include "showcase.server.secretName" . }}
          {{- end }}
          env:
            {{- if and .Values.mongodb.enabled (not .Values.showcase.server.existingSecret) }}
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ tpl (.Values.mongodb.auth.existingSecret | toString) . | quote }}
                  key: {{ .Values.mongodb.auth.existingSecretPasswordKey | quote }}
            - name: MONGODB_HOST
              value: {{ printf "$(%s_SERVICE_HOST)" (include "showcase.mongodb.serviceEnvPrefix" .) | quote }}
            - name: MONGODB_URI
              value: {{ printf "mongodb://%s:$(MONGODB_PASSWORD)@$(MONGODB_HOST):27017/%s?authSource=%s%s" (.Values.mongodb.auth.rootUsername | default "admin") (.Values.showcase.server.mongodbConnection.database | default "bcwallet_demo") (.Values.showcase.server.mongodbConnection.authSource | default "admin") (include "showcase.mongodb.uriDriverQuerySuffix" .) | quote }}
            {{- end }}
            - name: BASE_ROUTE
              value: {{ .Values.showcase.baseRoute | quote }}
          {{- range .Values.showcase.server.extraEnv }}
            - name: {{ .name }}
              value: {{ .value | quote }}
          {{- end }}
          {{- with .Values.showcase.server.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.showcase.server.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.showcase.server.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.showcase.server.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end -}}
