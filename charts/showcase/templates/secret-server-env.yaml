{{- if or .Values.mongodb.enabled (not (empty .Values.showcase.server.secretEnv)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "showcase.server.secretName" . }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/component: server
type: Opaque
stringData:
{{- if .Values.mongodb.enabled }}
  MONGODB_URI: {{ printf "mongodb://%s:%s@%s:27017/bcwallet_demo?authSource=admin" .Values.mongodb.auth.rootUser (.Values.mongodb.auth.rootPassword | required "mongodb.auth.rootPassword is required when mongodb.enabled is true") (include "showcase.mongodb.host" .) | quote }}
{{- end }}
{{- range $k, $v := .Values.showcase.server.secretEnv }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
{{- end }}
