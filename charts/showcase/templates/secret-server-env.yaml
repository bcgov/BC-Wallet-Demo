{{- if and (not .Values.showcase.server.existingSecret) (or .Values.mongodb.auth.rootPassword (not (empty .Values.showcase.server.secretEnv))) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "showcase.server.secretName" . }}
  namespace: {{ include "showcase.namespace" . | quote }}
  labels: {{- include "showcase.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
type: Opaque
stringData:
{{- if and .Values.mongodb.enabled .Values.mongodb.auth.rootPassword }}
  {{- $user := .Values.mongodb.auth.rootUsername | default "admin" | urlquery }}
  {{- $pass := .Values.mongodb.auth.rootPassword | urlquery }}
  MONGODB_URI: {{ printf "mongodb://%s:%s@%s:27017/bcwallet_demo?authSource=admin" $user $pass (include "showcase.mongodb.host" .) | quote }}
{{- end }}
{{- range $k, $v := .Values.showcase.server.secretEnv }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
{{- end }}
