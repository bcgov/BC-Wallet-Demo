apiVersion: v2
name: bc-wallet-showcase
description: BC Wallet Showcase Builder services with PostgreSQL and RabbitMQ
type: application
version: 0.2.0
appVersion: "1.17.0"
dependencies:
  - name: postgresql
    version: "16.6.3"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: rabbitmq
    version: "16.0.5"
    repository: "https://charts.bitnami.com/bitnami"
    condition: rabbitmq.enabled
