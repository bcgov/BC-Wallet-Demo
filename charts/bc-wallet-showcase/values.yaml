postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: bitnami-legacy/postgresql
    tag: 16.6.3-debian-12-r0
  auth:
    enablePostgresUser: true
    username: "showcase-user"
    database: "showcase-db"
    secretKeys:
      adminPasswordKey: "postgres-password"
      userPasswordKey: "password"
  primary:
    service:
      ports:
        postgresql: 5432
    persistence:
      enabled: true
      size: 1Gi
    resources:
      limits:
        memory: 2Gi
      requests:
        cpu: 250m
        memory: 128Mi
    podSecurityContext:
      enabled: false
    containerSecurityContext:
      enabled: false
  networkPolicy:
    enabled: true
    extraIngress:
      - from:
          - podSelector:
              - matchLabels:
                  - app.kubernetes.io/name: bc-wallet
                  - app.kubernetes.io/component: api-server
          - podSelector:
              - matchLabels:
                  - app.kubernetes.io/name: bc-wallet
                  - app.kubernetes.io/component: demo-server
          - podSelector:
              - matchLabels:
                  - app.kubernetes.io/name: bc-wallet
                  - app.kubernetes.io/component: showcase-creator
  fullnameOverride: ""

rabbitmq:
  enabled: true
  image:
    registry: docker.io
    repository: bitnami-legacy/rabbitmq
    tag: 4.0.5-debian-12-r0
  auth:
    username: bc_user
    existingPasswordSecret: bc-wallet-rabbitmq-secret
    secretKeys:
      passwordKey: rabbitmq-password
  extraPlugins: "rabbitmq_management"
  configuration: |-
    management.listener.port = 15672
    management.listener.ssl = false
    default_user = bc_user
  service:
    type: ClusterIP
    ports:
      amqp: 5672
      manager: 15672
  rbac:
    create: false
  livenessProbe:
    enabled: true
    initialDelaySeconds: 300
  readinessProbe:
    enabled: true
  persistence:
    enabled: true
    size: 1Gi
  resources:
    limits:
      cpu: 200m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  containerSecurityContext:
    enabled: false
  podSecurityContext:
    enabled: false
  replicaCount: 1
  pdb:
    create: true
    minAvailable: 1
  networkPolicy:
    enabled: true
    extraIngress:
      - from:
          - podSelector:
              matchLabels:
                app.kubernetes.io/name: bc-wallet
                app.kubernetes.io/component: api-server
      - from:
          - podSelector:
              matchLabels:
                app.kubernetes.io/name: bc-wallet
                app.kubernetes.io/component: traction-adapter
    fullnameOverride: ""
