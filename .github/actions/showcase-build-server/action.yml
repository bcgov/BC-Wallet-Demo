name: Showcase build server image
description: Build and push bc-wallet-showcase-server to GHCR (provenance + SBOM)
inputs:
  image:
    description: Full image reference without tag (e.g. ghcr.io/bcgov/bc-wallet-showcase-server)
    required: true
  tag:
    description: Image tag (e.g. main or pr-42)
    required: true
  github_token:
    description: Token with packages write (typically secrets.GITHUB_TOKEN)
    required: true

runs:
  using: composite
  steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    # ghcr.io org packages: use repository owner (lowercase) with GITHUB_TOKEN — not github.actor
    # (avoids "denied: installation not allowed to Write organization package"). See GitHub Packages docs.
    - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ inputs.github_token }}

    - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

    - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

    - id: meta
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
      with:
        images: ${{ inputs.image }}
        tags: |
          type=raw,value=${{ inputs.tag }}

    - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        context: .
        file: ./server/Dockerfile
        push: true
        platforms: linux/amd64,linux/arm64
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        annotations: ${{ steps.meta.outputs.annotations }}
        provenance: mode=min
        sbom: true
        cache-from: type=gha
        cache-to: type=gha,mode=max
