name: Release showcase Helm chart (GitHub Pages)

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      ref:
        description: Optional git ref (branch, tag, or SHA). Defaults to the branch selected in Run workflow.
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: helm-release-showcase-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: chart-releaser → gh-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      - uses: ./.github/actions/showcase-helm-lint
        with:
          skip_checkout: 'true'

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Validate Chart.yaml version is new
        run: |
          set -euo pipefail
          current_version=$(grep '^version:' charts/showcase/Chart.yaml | awk '{print $2}')
          
          # Find the latest tag (assuming semantic versioning: v* or chart-*-v*)
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [[ -z "$latest_tag" ]]; then
            echo "ℹ️  No previous tags found. First release — proceeding."
            exit 0
          fi
          
          # Extract Chart.yaml version from the previous release
          prev_version=$(git show "$latest_tag:charts/showcase/Chart.yaml" 2>/dev/null | grep '^version:' | awk '{print $2}' || echo "")
          
          if [[ -z "$prev_version" ]]; then
            echo "⚠️  Could not extract version from previous release ($latest_tag). Proceeding cautiously."
            exit 0
          fi
          
          # Compare versions
          if [[ "$current_version" == "$prev_version" ]]; then
            echo "❌ Chart.yaml version has not changed."
            echo "   Current version: $current_version"
            echo "   Previous version (in $latest_tag): $prev_version"
            echo ""
            echo "   chart-releaser will skip this chart (skips existing versions)."
            echo "   To fix: Bump charts/showcase/Chart.yaml version before creating the release."
            exit 1
          fi
          
          echo "✅ Chart.yaml version updated: $prev_version → $current_version"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          charts_dir: charts
          skip_existing: true
        env:
          CR_TOKEN: '${{ secrets.GITHUB_TOKEN }}'

      - name: Release summary
        if: always()
        run: |
          {
            echo "### Showcase chart (GitHub Pages)"
            echo ""
            echo "chart-releaser publishes when a GitHub Release is published and \`charts/showcase/Chart.yaml\` **version** is new."
            echo ""
            echo "**Helm repo:** \`https://bcgov.github.io/BC-Wallet-Demo\`"
            echo ""
            echo '```bash'
            echo "helm repo add bc-wallet-showcase https://bcgov.github.io/BC-Wallet-Demo"
            echo "helm repo update"
            echo "helm search repo bc-wallet-showcase"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
