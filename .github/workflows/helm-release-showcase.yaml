name: Release showcase Helm chart (GitHub Pages)

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      ref:
        description: Optional git ref (branch, tag, or SHA). Defaults to the branch selected in Run workflow.
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: helm-release-showcase-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: chart-releaser → gh-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      - uses: ./.github/actions/showcase-helm-lint
        with:
          skip_checkout: 'true'

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          charts_dir: charts
          skip_existing: true
        env:
          CR_TOKEN: '${{ secrets.GITHUB_TOKEN }}'

      - name: Release summary
        if: always()
        run: |
          {
            echo "### Showcase chart (GitHub Pages)"
            echo ""
            echo "chart-releaser publishes when a GitHub Release is published and \`charts/showcase/Chart.yaml\` **version** is new."
            echo ""
            echo "**Helm repo:** \`https://bcgov.github.io/BC-Wallet-Demo\`"
            echo ""
            echo '```bash'
            echo "helm repo add bc-wallet-showcase https://bcgov.github.io/BC-Wallet-Demo"
            echo "helm repo update"
            echo "helm search repo bc-wallet-showcase"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
