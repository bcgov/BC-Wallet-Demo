name: Build and Publish Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      run_cypress:
        description: 'Run Cypress (browser E2E) before building images'
        type: boolean
        default: false

# Default least-privilege token; jobs that push GHCR images add packages: write.
permissions:
  contents: read

env:
  HUSKY: '0'
  REGISTRY: ghcr.io
  SHOWCASE_FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/bc-wallet-showcase-frontend
  SHOWCASE_SERVER_IMAGE: ghcr.io/${{ github.repository_owner }}/bc-wallet-showcase-server

jobs:
  cypress-run:
    name: Cypress E2E (optional)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    if: github.event_name == 'workflow_dispatch' && inputs.run_cypress
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup NodeJS
        uses: ./.github/actions/setup-node
        with:
          node-version: 22

      - name: Start App
        run: |
          yarn install --frozen-lockfile --network-timeout 600000
          NODE_ENV=test VITE_HOST_BACKEND=http://localhost:5000 yarn dev &

      - name: Wait for dev servers (HTTP)
        run: >
          npx --yes wait-on@8
          http://localhost:3000
          http://localhost:5000
          --timeout 600000
          --interval 5000

      - name: Warm-up for agent / credential defs
        run: sleep 45s
        shell: bash

      - name: Cypress run
        uses: cypress-io/github-action@f790eee7a50d9505912f50c2095510be7de06aa7 # v6.10.9
        with:
          install: false
          # Only record to Cypress Cloud when the repo/org secret is configured.
          record: ${{ secrets.CYPRESS_RECORD_KEY != '' }}
          browser: chrome
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cypress-skipped:
    name: Cypress skipped
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.run_cypress)
    permissions:
      contents: read
    steps:
      - run: echo "Skipping Cypress (manual run with run_cypress=false)"

  build-and-push-image-server:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [cypress-run, cypress-skipped]
    if: ${{ !cancelled() && needs.cypress-run.result != 'failure' && needs.cypress-skipped.result != 'failure' && (needs.cypress-run.result == 'success' || needs.cypress-skipped.result == 'success') }}
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.SHOWCASE_SERVER_IMAGE }}

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./server/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: mode=min
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-image-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [cypress-run, cypress-skipped]
    if: ${{ !cancelled() && needs.cypress-run.result != 'failure' && needs.cypress-skipped.result != 'failure' && (needs.cypress-run.result == 'success' || needs.cypress-skipped.result == 'success') }}
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.SHOWCASE_FRONTEND_IMAGE }}

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: mode=min
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            REACT_APP_INSIGHTS_PROJECT_ID=${{ vars.REACT_APP_INSIGHTS_PROJECT_ID || secrets.REACT_APP_INSIGHTS_PROJECT_ID }}
            REACT_APP_HOST_BACKEND=${{ vars.REACT_APP_HOST_BACKEND || secrets.REACT_APP_HOST_BACKEND }}
