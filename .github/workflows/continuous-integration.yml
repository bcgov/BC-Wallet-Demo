name: Continuous Integration

on:
  pull_request:
    branches: [main, release]

permissions:
  contents: read

jobs:
  server-unit-tests:
    name: Server Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: ./.github/actions/setup-node
        with:
          node-version: 22

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run server unit tests
        run: yarn workspace server test

  frontend-unit-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: ./.github/actions/setup-node
        with:
          node-version: 22

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run frontend unit tests
        run: yarn workspace frontend test:unit

  cypress-run:
    name: Cypress E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: ./.github/actions/setup-node
        with:
          node-version: 22

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Linting
        run: yarn lint

      - name: Check formatting
        run: yarn prettier --check

      - name: Compile
        run: yarn check-types

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          install: false
          start: yarn workspace frontend start
          wait-on: 'http://localhost:3000'
          browser: chrome
        env:
          REACT_APP_HOST_BACKEND: http://localhost:5000
          REACT_APP_KEYCLOAK_URL: http://localhost:8080
          REACT_APP_KEYCLOAK_REALM: my-app
          REACT_APP_KEYCLOAK_CLIENT_ID: frontend
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
